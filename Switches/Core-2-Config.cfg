! Command: show running-config
! device: localhost (vEOS-lab, EOS-4.35.2F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
spanning-tree mode rapid-pvst
spanning-tree vlan-id 10,20,30,50,60,70 priority 4096
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 10,20,30,50,60,70
!
interface Port-Channel1
   switchport trunk allowed vlan 10,20,30,50,60,70
   switchport mode trunk
!
interface Ethernet1
   switchport trunk allowed vlan 10,20,30,50,60,70
   switchport mode trunk
   no switchport
   ip address 10.10.80.14/30
!
interface Ethernet2
   switchport trunk allowed vlan 10,20,30,50,60,70
   switchport mode trunk
   ip access-group CLIENT-TO-SERVERS in
!
interface Ethernet3
   switchport trunk allowed vlan 10,20,30,50,60,70
   switchport mode trunk
   ip access-group CLIENT-TO-SERVERS in
!
interface Ethernet4
   switchport trunk allowed vlan 10,20,30,50,60,70
   switchport mode trunk
   ip access-group CLIENT-TO-SERVERS in
!
interface Ethernet5
   switchport trunk allowed vlan 10,20,30,50,60,70
   switchport mode trunk
!
interface Ethernet6
   no switchport
   ip address 10.10.80.22/30
!
interface Ethernet7
!
interface Ethernet8
!
interface Ethernet9
!
interface Ethernet10
!
interface Ethernet11
   channel-group 1 mode active
!
interface Ethernet12
   channel-group 1 mode active
!
interface Management1
!
interface Vlan10
   ip address 10.10.10.1/24
   ip helper-address 10.10.50.10
   vrrp 1 priority-level 150
   vrrp 1 ipv4 10.10.10.250
!
interface Vlan20
   ip address 10.10.20.1/24
   ip helper-address 10.10.50.10
   vrrp 2 priority-level 150
   vrrp 2 ipv4 10.10.20.250
!
interface Vlan30
   ip address 10.10.30.1/24
   ip helper-address 10.10.50.10
   vrrp 3 priority-level 150
   vrrp 3 ipv4 10.10.30.250
!
interface Vlan50
   ip address 10.10.50.1/24
   vrrp 5 priority-level 150
   vrrp 5 ipv4 10.10.50.250
!
interface Vlan60
   ip address 10.10.60.1/24
   vrrp 6 priority-level 150
   vrrp 6 ipv4 10.10.60.250
!
interface Vlan70
   ip address 10.10.70.1/24
   vrrp 7 priority-level 150
   vrrp 7 ipv4 10.10.70.250
!
ip access-list CLIENT-TO-SERVERS
   10 permit udp any 10.10.50.0/24 eq bootps
   20 permit udp any 10.10.50.0/24 eq bootpc
   30 permit udp any 10.10.60.0/24 eq domain
   40 permit tcp any 10.10.60.0/24 eq domain
   50 permit tcp any 10.10.70.0/24 eq https
   60 permit tcp any 10.10.70.0/24 eq www
   70 deny ip any 10.10.10.0/24
   80 deny ip any 10.10.20.0/24
   90 deny ip any 10.10.30.0/24
   100 permit ip any any
!
ip routing
!
router ospf 1
   router-id 3.3.3.3
   network 10.10.10.0/24 area 0.0.0.0
   network 10.10.20.0/24 area 0.0.0.0
   network 10.10.30.0/24 area 0.0.0.0
   network 10.10.50.0/24 area 0.0.0.0
   network 10.10.60.0/24 area 0.0.0.0
   network 10.10.70.0/24 area 0.0.0.0
   network 10.10.80.12/30 area 0.0.0.0
   network 10.10.80.20/30 area 0.0.0.0
   max-lsa 12000
!
end
