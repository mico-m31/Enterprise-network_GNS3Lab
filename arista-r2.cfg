! Command: show running-config
! device: localhost (vEOS-lab, EOS-4.35.2F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
interface Ethernet1
   no switchport
   ip address 10.10.80.5/30
!
interface Ethernet2
   no switchport
   ip address 10.10.80.13/30
!
interface Ethernet3
   no switchport
   ip address 10.10.80.10/30
!
interface Ethernet4
   no switchport
   ip address 10.10.80.17/30
!
interface Ethernet5
!
interface Ethernet6
!
interface Ethernet7
!
interface Ethernet8
!
interface Ethernet9
!
interface Ethernet10
!
interface Ethernet11
!
interface Ethernet12
!
interface Management1
!
ip routing
!
ip route 0.0.0.0/0 10.10.80.6
!
router ospf 1
   router-id 1.1.1.1
   network 10.10.80.4/30 area 0.0.0.0
   network 10.10.80.8/30 area 0.0.0.0
   network 10.10.80.12/30 area 0.0.0.0
   network 10.10.80.16/30 area 0.0.0.0
   max-lsa 12000
   default-information originate
!
end
